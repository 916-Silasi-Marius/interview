spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: 4a6f686e446f654a57545365637265744b6579466f72496e746572766965774170706c69636174696f6e32303236

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [requestId=%X{requestId:-} logLevel=%-5level loggerName=%logger{36}] - %msg%n"

